workflows:
  android-release:
    name: ChessMotion Android Release
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      java: 17
    scripts:
      - name: Print versions
        script: |
          flutter --version
          java -version
          echo "Working dir: $(pwd)"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze Dart code
        script: flutter analyze --no-fatal-infos || true

      - name: Build release APK
        script: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --verbose 2>&1 | tail -50 || flutter build apk --release --no-tree-shake-icons

      - name: Locate APK
        script: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" -not -path "*/cache/*" 2>/dev/null || echo "No APK found"
          echo "=== flutter-apk folder ==="
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk folder"
          echo "=== apk/release folder ==="
          ls -la build/app/outputs/apk/release/ 2>/dev/null || echo "No apk/release folder"

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/**/*.apk
      - build/**/*.apk

    publishing:
      email:
        recipients:
          - rekhaji7172@gmail.com
        notify:
          success: true
          failure: true
